id: testagent
name: TestAgent
version: 1.0.0
description: testing123
primary_llm:
  provider: simulated
  model_name: gpt-4-turbo
  temperature: 0.0
  max_tokens: 2048
secondary_llm:
  provider: simulated
  model_name: gpt-3.5-turbo
  temperature: 0.2
  max_tokens: 1024
prompt_bindings:
  planner_system_prompt: planner-default
  synthesis_system_prompt: synthesis-default
  tool_guidance_prompt: test-prompt
  user_context_prompt: testprompt
prompts:
  planner_system_prompt: 'You are an expert dynamic AI planner.

    Analyze the user''s operational query, match it with available skills,

    and generate a dynamic Task execution DAG with correct dependency wiring.

    '
  synthesis_system_prompt: 'You are a principal staff reliability engineer.

    Aggregate execution metrics, debug logs, and ticket history from the DAG,

    and write a detailed Root Cause Analysis (RCA) report.

    '
enabled_skills:
- IncidentTriageSkill
- RootCauseAnalysisSkill
enabled_tools:
- logs_tool
- metrics_tool
- incident_search_tool
- rca_tool
policies:
  max_concurrency: 4
  timeout_seconds: 30
